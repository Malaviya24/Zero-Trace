<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; media-src 'self' blob: data: https:; font-src 'self' data:; connect-src 'self' https: http: ws: wss:;" />
  <meta name="referrer" content="no-referrer" />
  <link rel="icon" type="image/png" href="/logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zero-Trace</title>
  <style>
    #splash-screen {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      transition: opacity 0.4s ease-out;
      font-family: system-ui, -apple-system, sans-serif;
      background: oklch(0.96 0.012 280);
      color: #111827;
    }

    #splash-screen.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    #splash-screen .splash-ring {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 2.5px solid transparent;
      border-top-color: oklch(0.55 0.24 285);
      border-right-color: oklch(0.55 0.24 285 / 40%);
      animation: splash-spin 1.1s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }

    #splash-screen .splash-title {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, oklch(0.55 0.24 285), oklch(0.65 0.22 310), oklch(0.6 0.2 250));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    html.dark #splash-screen {
      background: oklch(0.16 0.015 280);
      color: #fafafa;
    }

    html.dark #splash-screen .splash-ring {
      border-top-color: oklch(0.68 0.18 285);
      border-right-color: oklch(0.68 0.18 285 / 40%);
    }

    html[data-surface="site"] #splash-screen {
      background: #09090b;
      color: #fafafa;
      font-family: "Space Grotesk", system-ui, sans-serif;
      gap: 2rem;
    }

    html[data-surface="site"] #splash-screen::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: linear-gradient(rgba(63, 63, 70, 0.28) 1px, transparent 1px), linear-gradient(90deg, rgba(63, 63, 70, 0.28) 1px, transparent 1px);
      background-size: 32px 32px;
      opacity: 0.35;
    }

    html[data-surface="site"] #splash-screen .splash-ring {
      width: 124px;
      height: 124px;
      border-radius: 0;
      border: 2px solid #3f3f46;
      border-top-color: #dfe104;
      border-right-color: #dfe104;
      animation: splash-spin 1.2s linear infinite;
    }

    html[data-surface="site"] #splash-screen .splash-title {
      position: relative;
      font-size: clamp(3rem, 10vw, 8rem);
      line-height: 0.82;
      letter-spacing: -0.08em;
      text-transform: uppercase;
      background: none;
      -webkit-text-fill-color: currentColor;
      color: #fafafa;
    }

    html[data-surface="site"] #splash-screen .splash-subtitle {
      position: relative;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: #dfe104;
    }

    @keyframes splash-spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <script>
    try {
      var pathname = window.location.pathname;
      var isPreservedSurface = pathname === "/join" || pathname.indexOf("/join/") === 0 || pathname.indexOf("/room/") === 0 || pathname.indexOf("/call/") === 0;
      document.documentElement.dataset.surface = isPreservedSurface ? "app" : "site";
      var savedTheme = localStorage.getItem("theme");
      var prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
      if (savedTheme ? savedTheme === "dark" : prefersDark) document.documentElement.classList.add("dark");
    } catch (e) {}
  </script>
  <div id="splash-screen">
    <div class="splash-ring"></div>
    <div class="splash-subtitle">Zero Trace Network</div>
    <div class="splash-title">Zero-Trace</div>
  </div>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
